<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Healthcare Score account">
    <title>Register — Healthcare Score System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💚</text></svg>">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate-in">
            <div class="auth-header">
                <div class="logo-circle">💚</div>
                <h1>Create Account</h1>
                <p class="subtitle">Start tracking your preventive health score</p>
            </div>

            <div id="alertBox"></div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required>
                </div>
                <button type="submit" id="registerBtn" class="btn btn-primary btn-full">
                    Create Account
                </button>
            </form>

            <p style="text-align:center; margin-top:1.5rem; color:var(--text-secondary); font-size:0.9rem;">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirmPassword").value;

            if (password !== confirm) {
                showAlert("alertBox", "Passwords do not match.");
                return;
            }

            const btn = document.getElementById("registerBtn");
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Creating account...';

            try {
                await api("/register", {
                    method: "POST",
                    body: JSON.stringify({
                        name: document.getElementById("name").value,
                        email: document.getElementById("email").value,
                        password: password,
                    }),
                });
                showAlert("alertBox", "Account created! Redirecting to login...", "success");
                setTimeout(() => window.location.href = "login.html", 1200);
            } catch (err) {
                showAlert("alertBox", err.message);
                btn.disabled = false;
                btn.textContent = "Create Account";
            }
        }
    </script>
</body>
</html>
